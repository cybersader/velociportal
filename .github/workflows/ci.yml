name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -v -race -count=1 ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o velociportal .
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: velociportal
          path: velociportal

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (verify only, no push)
        run: docker build -t velociportal:test .
